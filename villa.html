<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏗️ VILLA BUILDER - Mission to $3.9M</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #0a0e27;
            --bg-card: #1a1f3a;
            --accent-primary: #667eea;
            --accent-secondary: #764ba2;
            --accent-gold: #f39c12;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --success: #48bb78;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-title {
            font-size: 4em;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 50%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: -2px;
            animation: gradientShift 3s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header-subtitle {
            font-size: 1.3em;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        /* Glass Card */
        .glass-card {
            background: rgba(26, 31, 58, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px;
            box-shadow: 0 20px 60px var(--shadow);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 80px var(--shadow);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card-title {
            font-size: 1.8em;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-icon {
            font-size: 1.2em;
            filter: drop-shadow(0 0 10px currentColor);
        }

        /* Villa 3D Display */
        .villa-scene {
            position: relative;
            height: 500px;
            background: linear-gradient(180deg, #1e3a8a 0%, #3b82f6 50%, #e0f2fe 100%);
            border-radius: 25px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: inset 0 -50px 100px rgba(0, 0, 0, 0.3);
        }

        /* Sun/Moon */
        .celestial {
            position: absolute;
            top: 50px;
            right: 50px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffd700 0%, #ff8c00 100%);
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.8);
            animation: celestialMove 20s infinite;
        }

        @keyframes celestialMove {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Clouds */
        .cloud {
            position: absolute;
            width: 100px;
            height: 40px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50px;
            animation: cloudFloat 30s linear infinite;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .cloud:nth-child(1) { top: 60px; animation-duration: 25s; }
        .cloud:nth-child(2) { top: 120px; animation-duration: 35s; animation-delay: -10s; }
        .cloud:nth-child(3) { top: 90px; animation-duration: 40s; animation-delay: -20s; }

        @keyframes cloudFloat {
            0% { left: -120px; }
            100% { left: calc(100% + 120px); }
        }

        /* Ground Layers */
        .ground-layer {
            position: absolute;
            bottom: 0;
            width: 100%;
            z-index: 1;
        }

        .grass {
            height: 60px;
            background: linear-gradient(180deg, #22c55e 0%, #15803d 100%);
            box-shadow: inset 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .soil {
            height: 50px;
            background: linear-gradient(180deg, #92400e 0%, #78350f 100%);
        }

        /* 3D Villa Structure */
        .villa-structure {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            height: 300px;
            transform-style: preserve-3d;
            transition: all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* Foundation */
        .foundation {
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 25px;
            background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }

        .foundation.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Main Walls */
        .wall {
            position: absolute;
            background: linear-gradient(135deg, #f5deb3 0%, #daa520 100%);
            border: 4px solid #8b7355;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .wall.visible {
            opacity: 1;
            transform: scale(1);
        }

        .wall-main {
            bottom: 25px;
            left: 10%;
            width: 80%;
            height: 180px;
            border-radius: 10px;
        }

        /* Roof */
        .roof {
            position: absolute;
            bottom: 205px;
            left: 5%;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-bottom: 90px solid #dc2626;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.5));
            opacity: 0;
            transform: translateY(-30px);
            transition: all 0.8s ease-out;
        }

        .roof.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Windows */
        .window {
            position: absolute;
            width: 50px;
            height: 65px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            border: 4px solid #1e3a8a;
            border-radius: 8px;
            box-shadow: inset 0 2px 10px rgba(255, 255, 255, 0.3),
                        0 5px 20px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: all 0.6s ease-out;
        }

        .window.visible {
            opacity: 1;
        }

        .window::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: #1e3a8a;
        }

        .window::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            background: #1e3a8a;
        }

        .window-left { top: 60px; left: 40px; }
        .window-right { top: 60px; right: 40px; }

        /* Door */
        .door {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 100px;
            background: linear-gradient(135deg, #92400e 0%, #78350f 100%);
            border: 4px solid #451a03;
            border-radius: 10px 10px 0 0;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5),
                        0 5px 20px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: all 0.6s ease-out;
        }

        .door.visible {
            opacity: 1;
        }

        .door-knob {
            position: absolute;
            right: 12px;
            top: 50%;
            width: 8px;
            height: 8px;
            background: gold;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        /* Garden Elements */
        .garden-element {
            position: absolute;
            bottom: 110px;
            font-size: 4em;
            opacity: 0;
            transition: all 0.8s ease-out;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.3));
        }

        .garden-element.visible {
            opacity: 1;
        }

        .tree {
            animation: treeSway 4s ease-in-out infinite;
        }

        @keyframes treeSway {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        .tree-left { left: 30px; }
        .tree-right { right: 30px; }

        /* Pool */
        .pool {
            position: absolute;
            bottom: 110px;
            left: 30px;
            width: 120px;
            height: 70px;
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            border-radius: 50%;
            border: 5px solid #0e7490;
            box-shadow: inset 0 5px 20px rgba(255, 255, 255, 0.3),
                        0 10px 30px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: all 0.8s ease-out;
        }

        .pool.visible {
            opacity: 1;
            animation: waterRipple 3s ease-in-out infinite;
        }

        @keyframes waterRipple {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Fence */
        .fence {
            position: absolute;
            bottom: 110px;
            left: 0;
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: space-around;
            opacity: 0;
            transition: all 0.8s ease-out;
        }

        .fence.visible {
            opacity: 1;
        }

        .fence-post {
            width: 8px;
            height: 100%;
            background: linear-gradient(135deg, #92400e 0%, #78350f 100%);
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Lights Effect */
        .lights {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 30%, rgba(255, 215, 0, 0.2) 0%, transparent 60%);
            opacity: 0;
            transition: all 0.8s ease-out;
            pointer-events: none;
        }

        .lights.visible {
            opacity: 1;
            animation: lightPulse 3s ease-in-out infinite;
        }

        @keyframes lightPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Stage Banner */
        .stage-banner {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            padding: 20px 30px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.4s ease;
        }

        .stage-banner:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .stage-name {
            font-size: 1.6em;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stage-desc {
            font-size: 1em;
            opacity: 0.95;
        }

        /* Progress Section */
        .progress-section {
            margin-bottom: 30px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .progress-percent {
            font-size: 1.8em;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .progress-track {
            height: 50px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary) 0%, var(--accent-secondary) 50%, var(--accent-gold) 100%);
            background-size: 200% 100%;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1em;
            transition: width 2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
            animation: progressGradient 3s linear infinite;
        }

        @keyframes progressGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: progressShine 2s infinite;
        }

        @keyframes progressShine {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat-box:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .stat-label {
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Milestones Timeline */
        .timeline {
            position: relative;
            padding: 20px 0;
        }

        .timeline-line {
            position: absolute;
            left: 30px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--accent-primary) 0%, var(--accent-gold) 100%);
            border-radius: 2px;
        }

        .milestone {
            position: relative;
            padding-left: 70px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .milestone:hover {
            transform: translateX(10px);
        }

        .milestone-dot {
            position: absolute;
            left: 21px;
            top: 10px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid var(--accent-primary);
            transition: all 0.4s ease;
        }

        .milestone.completed .milestone-dot {
            background: var(--accent-primary);
            box-shadow: 0 0 20px var(--accent-primary);
            animation: dotPulse 2s infinite;
        }

        @keyframes dotPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--accent-primary); }
            50% { transform: scale(1.2); box-shadow: 0 0 30px var(--accent-primary); }
        }

        .milestone-content {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .milestone.completed .milestone-content {
            background: rgba(102, 126, 234, 0.2);
            border-color: var(--accent-primary);
        }

        .milestone-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .milestone-icon {
            font-size: 1.8em;
            filter: grayscale(100%);
        }

        .milestone.completed .milestone-icon {
            filter: grayscale(0%);
            animation: iconBounce 0.6s;
        }

        @keyframes iconBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .milestone-title {
            font-weight: 700;
            font-size: 1.1em;
        }

        .milestone-day {
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        .milestone-value {
            color: var(--accent-gold);
            font-weight: 700;
        }

        /* Action Buttons */
        .action-buttons {
            display: grid;
            gap: 15px;
        }

        .btn {
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .header-title {
                font-size: 3em;
            }
        }

        @media (max-width: 768px) {
            .header-title {
                font-size: 2.5em;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .villa-scene {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation" id="bgAnimation"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1 class="header-title">🏗️ VILLA BUILDER</h1>
            <p class="header-subtitle">Building Your Dream Villa | $2,200 → $3,925,613</p>
        </div>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Left Column: Stats -->
            <div class="glass-card">
                <h2 class="card-title">
                    <span class="card-icon">📊</span>
                    Your Progress
                </h2>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">💰 Investment</div>
                        <div class="stat-value">$2.2K</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">🎯 Goal</div>
                        <div class="stat-value">$3.9M</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">📈 Current</div>
                        <div class="stat-value" id="currentValue">$2.8K</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">💵 Profit</div>
                        <div class="stat-value" id="profitValue">$650</div>
                    </div>
                </div>

                <div class="progress-section">
                    <div class="progress-header">
                        <span>Mission Progress</span>
                        <span class="progress-percent" id="progressPercent">3.6%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill" style="width: 0%;">
                            <span id="progressText">Day 13/365</span>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="completeDay()">
                        ✅ Complete Another Day
                    </button>
                    <button class="btn btn-secondary" onclick="window.location.href='index.html'">
                        📊 Back to Dashboard
                    </button>
                </div>
            </div>

            <!-- Center Column: Villa -->
            <div class="glass-card">
                <h2 class="card-title">
                    <span class="card-icon">🏠</span>
                    Your Villa
                </h2>

                <div class="villa-scene">
                    <!-- Sky Elements -->
                    <div class="celestial"></div>
                    <div class="cloud"></div>
                    <div class="cloud"></div>
                    <div class="cloud"></div>

                    <!-- Villa Structure -->
                    <div class="villa-structure">
                        <div class="foundation" id="foundation"></div>
                        <div class="wall wall-main" id="wallMain"></div>
                        <div class="window window-left" id="windowLeft"></div>
                        <div class="window window-right" id="windowRight"></div>
                        <div class="door" id="door">
                            <div class="door-knob"></div>
                        </div>
                        <div class="roof" id="roof"></div>
                    </div>

                    <!-- Garden -->
                    <div class="garden-element tree tree-left" id="treeLeft">🌳</div>
                    <div class="garden-element tree tree-right" id="treeRight">🌳</div>
                    <div class="pool" id="pool"></div>
                    <div class="fence" id="fence">
                        <div class="fence-post"></div>
                        <div class="fence-post"></div>
                        <div class="fence-post"></div>
                        <div class="fence-post"></div>
                        <div class="fence-post"></div>
                        <div class="fence-post"></div>
                        <div class="fence-post"></div>
                        <div class="fence-post"></div>
                    </div>
                    <div class="lights" id="lights"></div>

                    <!-- Ground -->
                    <div class="ground-layer">
                        <div class="grass"></div>
                        <div class="soil"></div>
                    </div>
                </div>

                <div class="stage-banner" id="stageBanner">
                    <div class="stage-name">🏗️ Foundation Stage</div>
                    <div class="stage-desc">Building the foundation of your villa</div>
                </div>
            </div>

            <!-- Right Column: Milestones -->
            <div class="glass-card">
                <h2 class="card-title">
                    <span class="card-icon">🏆</span>
                    Milestones
                </h2>

                <div class="timeline" id="timeline">
                    <div class="timeline-line"></div>
                    <!-- Milestones will be added here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const INITIAL_AMOUNT = 2200;
        const DAILY_GROWTH = 1.02;
        const TOTAL_DAYS = 365;

        // Stages
        const stages = [
            { min: 0, max: 5, name: '🏗️ Foundation Stage', desc: 'Building the foundation', elements: ['foundation'] },
            { min: 5, max: 15, name: '🧱 Walls Stage', desc: 'Constructing walls and structure', elements: ['foundation', 'wallMain'] },
            { min: 15, max: 30, name: '🏠 Roof Stage', desc: 'Adding roof, doors and windows', elements: ['foundation', 'wallMain', 'roof', 'door', 'windowLeft', 'windowRight'] },
            { min: 30, max: 50, name: '🏡 Finishing Stage', desc: 'Interior and exterior finishing', elements: ['foundation', 'wallMain', 'roof', 'door', 'windowLeft', 'windowRight'] },
            { min: 50, max: 75, name: '🏘️ Garden Stage', desc: 'Adding garden, trees and pool', elements: ['foundation', 'wallMain', 'roof', 'door', 'windowLeft', 'windowRight', 'treeLeft', 'treeRight', 'pool'] },
            { min: 75, max: 100, name: '🏰 Luxury Villa!', desc: 'Lighting, fence and all luxuries!', elements: ['foundation', 'wallMain', 'roof', 'door', 'windowLeft', 'windowRight', 'treeLeft', 'treeRight', 'pool', 'fence', 'lights'] }
        ];

        // Milestones
        const milestones = [
            { day: 7, icon: '🌟', text: 'First Week', value: 2613 },
            { day: 30, icon: '📅', text: 'First Month', value: 3987 },
            { day: 60, icon: '💰', text: 'Two Months', value: 7224 },
            { day: 90, icon: '🏆', text: '3 Months', value: 13078 },
            { day: 180, icon: '💎', text: 'Half Year', value: 340318 },
            { day: 365, icon: '🏰', text: 'Full Year!', value: 3925613 }
        ];

        // Game State
        let gameState = {
            day: 13,
            currentValue: INITIAL_AMOUNT * Math.pow(DAILY_GROWTH, 13)
        };

        // Load/Save
        function loadGame() {
            const saved = localStorage.getItem('villaSave');
            if (saved) {
                gameState = JSON.parse(saved);
            }
        }

        function saveGame() {
            localStorage.setItem('villaSave', JSON.stringify(gameState));
        }

        // Format
        function formatCurrency(amount) {
            if (amount >= 1000000) return '$' + (amount / 1000000).toFixed(1) + 'M';
            if (amount >= 1000) return '$' + (amount / 1000).toFixed(1) + 'K';
            return '$' + amount.toLocaleString('en-US', { minimumFractionDigits: 0 });
        }

        function getProgressPercent() {
            return (gameState.day / TOTAL_DAYS) * 100;
        }

        function getCurrentStage() {
            const progress = getProgressPercent();
            for (let stage of stages) {
                if (progress >= stage.min && progress < stage.max) return stage;
            }
            return stages[stages.length - 1];
        }

        // Update Villa
        function updateVilla() {
            const stage = getCurrentStage();
            
            // Hide all
            ['foundation', 'wallMain', 'roof', 'door', 'windowLeft', 'windowRight', 'treeLeft', 'treeRight', 'pool', 'fence', 'lights'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.remove('visible');
            });

            // Show current stage elements
            setTimeout(() => {
                stage.elements.forEach((id, index) => {
                    setTimeout(() => {
                        const el = document.getElementById(id);
                        if (el) el.classList.add('visible');
                    }, index * 200);
                });
            }, 300);

            // Update stage banner
            document.getElementById('stageBanner').innerHTML = `
                <div class="stage-name">${stage.name}</div>
                <div class="stage-desc">${stage.desc}</div>
            `;
        }

        // Update UI
        function updateUI() {
            const progress = getProgressPercent();
            const profit = gameState.currentValue - INITIAL_AMOUNT;

            document.getElementById('progressPercent').textContent = progress.toFixed(1) + '%';
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `Day ${gameState.day}/${TOTAL_DAYS}`;

            document.getElementById('currentValue').textContent = formatCurrency(gameState.currentValue);
            document.getElementById('profitValue').textContent = formatCurrency(profit);

            updateVilla();
            updateMilestones();
        }

        // Update Milestones
        function updateMilestones() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '<div class="timeline-line"></div>';

            milestones.forEach(milestone => {
                const completed = gameState.day >= milestone.day;
                const div = document.createElement('div');
                div.className = 'milestone' + (completed ? ' completed' : '');
                div.innerHTML = `
                    <div class="milestone-dot"></div>
                    <div class="milestone-content">
                        <div class="milestone-header">
                            <span class="milestone-icon">${milestone.icon}</span>
                            <span class="milestone-title">${milestone.text}</span>
                        </div>
                        <div class="milestone-day">Day ${milestone.day}</div>
                        <div class="milestone-value">${formatCurrency(milestone.value)}</div>
                    </div>
                `;
                timeline.appendChild(div);
            });
        }

        // Complete Day
        function completeDay() {
            gameState.day++;
            gameState.currentValue = INITIAL_AMOUNT * Math.pow(DAILY_GROWTH, gameState.day);
            
            saveGame();
            updateUI();

            const milestone = milestones.find(m => m.day === gameState.day);
            if (milestone) {
                confetti({
                    particleCount: 200,
                    spread: 90,
                    origin: { y: 0.6 }
                });
            }
        }

        // Generate Stars
        function generateStars() {
            const bg = document.getElementById('bgAnimation');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                bg.appendChild(star);
            }
        }

        // Initialize
        loadGame();
        generateStars();
        updateUI();

        setTimeout(() => {
            const progress = getProgressPercent();
            document.getElementById('progressFill').style.width = progress + '%';
        }, 500);
    </script>
</body>
</html>
