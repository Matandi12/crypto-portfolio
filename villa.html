<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏗️ VILLA BUILDER - Mission to $3.9M</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #0a0e27;
            --bg-card: #1a1f3a;
            --accent-primary: #667eea;
            --accent-secondary: #764ba2;
            --accent-gold: #f39c12;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --success: #48bb78;
            --danger: #e74c3c;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-title {
            font-size: 4em;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 50%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: -2px;
            animation: gradientShift 3s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header-subtitle {
            font-size: 1.3em;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .glass-card {
            background: rgba(26, 31, 58, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px;
            box-shadow: 0 20px 60px var(--shadow);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 80px var(--shadow);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card-title {
            font-size: 1.8em;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Villa Scene - ENHANCED */
        .villa-scene {
            position: relative;
            height: 600px;
            background: linear-gradient(180deg, #1e3a8a 0%, #3b82f6 40%, #93c5fd 70%, #e0f2fe 100%);
            border-radius: 25px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: inset 0 -50px 100px rgba(0, 0, 0, 0.3);
        }

        .celestial {
            position: absolute;
            top: 50px;
            right: 50px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffd700 0%, #ff8c00 100%);
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.8);
            animation: celestialMove 20s infinite;
        }

        @keyframes celestialMove {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .cloud {
            position: absolute;
            width: 100px;
            height: 40px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50px;
            animation: cloudFloat 30s linear infinite;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .cloud:nth-child(1) { top: 60px; animation-duration: 25s; }
        .cloud:nth-child(2) { top: 120px; animation-duration: 35s; animation-delay: -10s; }
        .cloud:nth-child(3) { top: 90px; animation-duration: 40s; animation-delay: -20s; }

        @keyframes cloudFloat {
            0% { left: -120px; }
            100% { left: calc(100% + 120px); }
        }

        /* Ground */
        .ground-layer {
            position: absolute;
            bottom: 0;
            width: 100%;
            z-index: 1;
        }

        .grass {
            height: 80px;
            background: linear-gradient(180deg, #22c55e 0%, #15803d 100%);
            box-shadow: inset 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .soil {
            height: 60px;
            background: linear-gradient(180deg, #92400e 0%, #78350f 100%);
        }

        /* Villa Structure - MEGA ENHANCED */
        .villa-structure {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 400px;
            transform-style: preserve-3d;
        }

        /* Foundation */
        .foundation {
            position: absolute;
            bottom: 0;
            left: 5%;
            width: 90%;
            height: 30px;
            background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .foundation.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Main Building */
        .building-main {
            position: absolute;
            bottom: 30px;
            left: 10%;
            width: 80%;
            height: 220px;
            background: linear-gradient(135deg, #f5deb3 0%, #daa520 100%);
            border: 5px solid #8b7355;
            border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: scale(0.8);
            transition: all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .building-main.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* Roof - Detailed */
        .roof {
            position: absolute;
            bottom: 250px;
            left: 5%;
            width: 0;
            height: 0;
            border-left: 225px solid transparent;
            border-right: 225px solid transparent;
            border-bottom: 110px solid #dc2626;
            filter: drop-shadow(0 15px 40px rgba(0, 0, 0, 0.6));
            opacity: 0;
            transform: translateY(-40px);
            transition: all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .roof.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .roof::after {
            content: '';
            position: absolute;
            top: -110px;
            left: -225px;
            width: 450px;
            height: 10px;
            background: #991b1b;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        /* Chimney */
        .chimney {
            position: absolute;
            bottom: 310px;
            right: 120px;
            width: 30px;
            height: 60px;
            background: linear-gradient(135deg, #7c2d12 0%, #991b1b 100%);
            border: 3px solid #450a0a;
            border-radius: 5px;
            opacity: 0;
            transition: all 0.8s ease-out;
        }

        .chimney.visible {
            opacity: 1;
        }

        .chimney::after {
            content: '💨';
            position: absolute;
            top: -20px;
            left: 5px;
            font-size: 1.2em;
            animation: smoke 2s infinite;
        }

        @keyframes smoke {
            0% { opacity: 0.8; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-30px); }
        }

        /* Windows - Multiple Floors */
        .window {
            position: absolute;
            width: 55px;
            height: 70px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            border: 5px solid #1e3a8a;
            border-radius: 10px;
            box-shadow: inset 0 3px 15px rgba(255, 255, 255, 0.4),
                        0 8px 25px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: all 0.8s ease-out;
        }

        .window.visible {
            opacity: 1;
        }

        .window::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 3px;
            background: #1e3a8a;
        }

        .window::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            width: 3px;
            height: 100%;
            background: #1e3a8a;
        }

        /* Ground Floor Windows */
        .window-g1 { bottom: 60px; left: 60px; }
        .window-g2 { bottom: 60px; left: 150px; }
        .window-g3 { bottom: 60px; right: 150px; }
        .window-g4 { bottom: 60px; right: 60px; }

        /* First Floor Windows */
        .window-f1 { bottom: 150px; left: 60px; }
        .window-f2 { bottom: 150px; left: 150px; }
        .window-f3 { bottom: 150px; right: 150px; }
        .window-f4 { bottom: 150px; right: 60px; }

        /* Balcony */
        .balcony {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 50px;
            background: linear-gradient(135deg, #f5deb3 0%, #daa520 100%);
            border: 4px solid #8b7355;
            border-radius: 10px;
            opacity: 0;
            transition: all 0.8s ease-out;
        }

        .balcony.visible {
            opacity: 1;
        }

        .balcony-rail {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-top: 3px solid #8b7355;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 5px;
        }

        .rail-bar {
            width: 3px;
            height: 40px;
            background: #8b7355;
        }

        /* Door - Grand Entrance */
        .door {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 120px;
            background: linear-gradient(135deg, #92400e 0%, #78350f 100%);
            border: 5px solid #451a03;
            border-radius: 15px 15px 0 0;
            box-shadow: inset 0 3px 15px rgba(0, 0, 0, 0.6),
                        0 10px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: all 0.8s ease-out;
        }

        .door.visible {
            opacity: 1;
        }

        .door-knob {
            position: absolute;
            right: 15px;
            top: 55%;
            width: 10px;
            height: 10px;
            background: gold;
            border-radius: 50%;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.6);
        }

        .door-glass {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 50px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            border: 3px solid #1e3a8a;
            border-radius: 20px 20px 0 0;
        }

        /* Garden Elements */
        .tree {
            position: absolute;
            bottom: 140px;
            font-size: 5em;
            opacity: 0;
            transition: all 1s ease-out;
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.4));
            animation: treeSway 4s ease-in-out infinite;
        }

        @keyframes treeSway {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        .tree.visible {
            opacity: 1;
        }

        .tree-left { left: 10px; }
        .tree-right { right: 10px; }

        /* Luxury Pool */
        .pool {
            position: absolute;
            bottom: 140px;
            left: 40px;
            width: 140px;
            height: 85px;
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            border-radius: 50%;
            border: 6px solid #0e7490;
            box-shadow: inset 0 8px 25px rgba(255, 255, 255, 0.4),
                        0 15px 40px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: all 1s ease-out;
        }

        .pool.visible {
            opacity: 1;
            animation: waterRipple 3s ease-in-out infinite;
        }

        @keyframes waterRipple {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* Family Members */
        .family {
            position: absolute;
            font-size: 2.5em;
            opacity: 0;
            transition: all 1s ease-out;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.3));
        }

        .family.visible {
            opacity: 1;
            animation: familyWave 3s ease-in-out infinite;
        }

        @keyframes familyWave {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .dad { bottom: 145px; left: 180px; }
        .mom { bottom: 145px; left: 230px; }
        .kid1 { bottom: 145px; left: 280px; }
        .kid2 { bottom: 145px; left: 320px; }

        /* Luxury Cars */
        .car {
            position: absolute;
            font-size: 3em;
            opacity: 0;
            transition: all 1s ease-out;
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.4));
        }

        .car.visible {
            opacity: 1;
            animation: carShine 2s ease-in-out infinite;
        }

        @keyframes carShine {
            0%, 100% { filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.4)); }
            50% { filter: drop-shadow(0 8px 20px rgba(255, 215, 0, 0.6)); }
        }

        .car-1 { bottom: 145px; right: 180px; }
        .car-2 { bottom: 145px; right: 250px; }

        /* Fence - Elegant */
        .fence {
            position: absolute;
            bottom: 140px;
            left: 0;
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: space-around;
            opacity: 0;
            transition: all 1s ease-out;
        }

        .fence.visible {
            opacity: 1;
        }

        .fence-post {
            width: 10px;
            height: 100%;
            background: linear-gradient(135deg, #92400e 0%, #78350f 100%);
            border-radius: 5px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        /* Lights */
        .lights {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 35%, rgba(255, 215, 0, 0.25) 0%, transparent 65%);
            opacity: 0;
            transition: all 1s ease-out;
            pointer-events: none;
        }

        .lights.visible {
            opacity: 1;
            animation: lightPulse 3s ease-in-out infinite;
        }

        @keyframes lightPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* Stage Banner */
        .stage-banner {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            padding: 25px 35px;
            border-radius: 25px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
            transition: all 0.4s ease;
        }

        .stage-banner:hover {
            transform: scale(1.03);
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.7);
        }

        .stage-name {
            font-size: 1.8em;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .stage-desc {
            font-size: 1.1em;
            opacity: 0.95;
        }

        /* Progress */
        .progress-section {
            margin-bottom: 30px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .progress-percent {
            font-size: 2em;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .progress-track {
            height: 55px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: inset 0 3px 12px rgba(0, 0, 0, 0.4);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary) 0%, var(--accent-secondary) 50%, var(--accent-gold) 100%);
            background-size: 200% 100%;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2em;
            transition: width 2.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            animation: progressGradient 3s linear infinite;
        }

        @keyframes progressGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
        }

        .stat-label {
            font-size: 0.95em;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Buttons */
        .action-buttons {
            display: grid;
            gap: 15px;
        }

        .btn {
            padding: 22px;
            border: none;
            border-radius: 18px;
            font-size: 1.15em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: white;
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 45px rgba(102, 126, 234, 0.7);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger) 0%, #c0392b 100%);
            color: white;
            box-shadow: 0 12px 35px rgba(231, 76, 60, 0.5);
        }

        .btn-danger:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 45px rgba(231, 76, 60, 0.7);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-4px);
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding: 20px 0;
        }

        .timeline-line {
            position: absolute;
            left: 30px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, var(--accent-primary) 0%, var(--accent-gold) 100%);
            border-radius: 2px;
        }

        .milestone {
            position: relative;
            padding-left: 80px;
            margin-bottom: 35px;
            transition: all 0.3s ease;
        }

        .milestone:hover {
            transform: translateX(12px);
        }

        .milestone-dot {
            position: absolute;
            left: 20px;
            top: 12px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 4px solid var(--accent-primary);
            transition: all 0.4s ease;
        }

        .milestone.completed .milestone-dot {
            background: var(--accent-primary);
            box-shadow: 0 0 25px var(--accent-primary);
            animation: dotPulse 2s infinite;
        }

        @keyframes dotPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.25); }
        }

        .milestone-content {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .milestone.completed .milestone-content {
            background: rgba(102, 126, 234, 0.25);
            border-color: var(--accent-primary);
        }

        .milestone-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .milestone-icon {
            font-size: 2em;
            filter: grayscale(100%);
        }

        .milestone.completed .milestone-icon {
            filter: grayscale(0%);
            animation: iconBounce 0.6s;
        }

        @keyframes iconBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .milestone-title {
            font-weight: 700;
            font-size: 1.15em;
        }

        .milestone-value {
            color: var(--accent-gold);
            font-weight: 700;
            font-size: 1.1em;
        }

        /* Responsive */
        @media (max-width: 1400px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .villa-structure {
                width: 450px;
                height: 380px;
            }
        }

        @media (max-width: 768px) {
            .header-title {
                font-size: 2.5em;
            }

            .villa-scene {
                height: 500px;
            }

            .villa-structure {
                width: 350px;
                height: 300px;
                bottom: 140px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation" id="bgAnimation"></div>

    <div class="container">
        <div class="header">
            <h1 class="header-title">🏗️ VILLA BUILDER</h1>
            <p class="header-subtitle">Building Your Dream Villa | $2,200 → $3,925,613</p>
        </div>

        <div class="main-grid">
            <!-- Left: Stats -->
            <div class="glass-card">
                <h2 class="card-title">📊 Progress</h2>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">💰 Investment</div>
                        <div class="stat-value">$2.2K</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">🎯 Goal</div>
                        <div class="stat-value">$3.9M</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">📈 Current</div>
                        <div class="stat-value" id="currentValue">$2.8K</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">💵 Profit</div>
                        <div class="stat-value" id="profitValue">$650</div>
                    </div>
                </div>

                <div class="progress-section">
                    <div class="progress-header">
                        <span>Mission Progress</span>
                        <span class="progress-percent" id="progressPercent">3.6%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill" style="width: 0%;">
                            <span id="progressText">Day 13/365</span>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="completeDay()">
                        ✅ Complete Day
                    </button>
                    <button class="btn btn-danger" onclick="resetGame()">
                        🔄 Reset Game
                    </button>
                    <button class="btn btn-secondary" onclick="window.location.href='index.html'">
                        📊 Dashboard
                    </button>
                </div>
            </div>

            <!-- Center: Villa -->
            <div class="glass-card">
                <h2 class="card-title">🏠 Your Luxury Villa</h2>

                <div class="villa-scene">
                    <div class="celestial"></div>
                    <div class="cloud"></div>
                    <div class="cloud"></div>
                    <div class="cloud"></div>

                    <div class="villa-structure">
                        <!-- Building -->
                        <div class="foundation" id="foundation"></div>
                        <div class="building-main" id="buildingMain"></div>
                        <div class="roof" id="roof"></div>
                        <div class="chimney" id="chimney"></div>
                        
                        <!-- Windows -->
                        <div class="window window-g1" id="windowG1"></div>
                        <div class="window window-g2" id="windowG2"></div>
                        <div class="window window-g3" id="windowG3"></div>
                        <div class="window window-g4" id="windowG4"></div>
                        <div class="window window-f1" id="windowF1"></div>
                        <div class="window window-f2" id="windowF2"></div>
                        <div class="window window-f3" id="windowF3"></div>
                        <div class="window window-f4" id="windowF4"></div>
                        
                        <!-- Door & Balcony -->
                        <div class="door" id="door">
                            <div class="door-glass"></div>
                            <div class="door-knob"></div>
                        </div>
                        <div class="balcony" id="balcony">
                            <div class="balcony-rail">
                                <div class="rail-bar"></div>
                                <div class="rail-bar"></div>
                                <div class="rail-bar"></div>
                                <div class="rail-bar"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Garden & Luxury -->
                    <div class="tree tree-left" id="treeLeft">🌳</div>
                    <div class="tree tree-right" id="treeRight">🌳</div>
                    <div class="pool" id="pool"></div>
                    
                    <!-- Family -->
                    <div class="family dad" id="dad">👨</div>
                    <div class="family mom" id="mom">👩</div>
                    <div class="family kid1" id="kid1">👦</div>
                    <div class="family kid2" id="kid2">👧</div>
                    
                    <!-- Cars -->
                    <div class="car car-1" id="car1">🚗</div>
                    <div class="car car-2" id="car2">💎</div>
                    
                    <div class="fence" id="fence">
                        <div class="fence-post"></div>
                        <div class="fence-post"></div>
                        <div class="fence-post"></div>
                        <div class="fence-post"></div>
                        <div class="fence-post"></div>
                        <div class="fence-post"></div>
                        <div class="fence-post"></div>
                        <div class="fence-post"></div>
                        <div class="fence-post"></div>
                        <div class="fence-post"></div>
                    </div>
                    
                    <div class="lights" id="lights"></div>

                    <div class="ground-layer">
                        <div class="grass"></div>
                        <div class="soil"></div>
                    </div>
                </div>

                <div class="stage-banner" id="stageBanner">
                    <div class="stage-name">🏗️ Foundation Stage</div>
                    <div class="stage-desc">Building the foundation</div>
                </div>
            </div>

            <!-- Right: Milestones -->
            <div class="glass-card">
                <h2 class="card-title">🏆 Milestones</h2>
                <div class="timeline" id="timeline">
                    <div class="timeline-line"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const INITIAL_AMOUNT = 2200;
        const DAILY_GROWTH = 1.02;
        const TOTAL_DAYS = 365;

        const stages = [
            { min: 0, max: 5, name: '🏗️ Foundation', desc: 'Building the foundation', elements: ['foundation'] },
            { min: 5, max: 15, name: '🧱 Main Structure', desc: 'Walls and structure', elements: ['foundation', 'buildingMain', 'windowG1', 'windowG2', 'windowG3', 'windowG4'] },
            { min: 15, max: 30, name: '🏠 Roof & Windows', desc: 'Roof, doors, upper windows', elements: ['foundation', 'buildingMain', 'roof', 'chimney', 'door', 'windowG1', 'windowG2', 'windowG3', 'windowG4', 'windowF1', 'windowF2', 'windowF3', 'windowF4', 'balcony'] },
            { min: 30, max: 50, name: '🏡 Garden & Pool', desc: 'Trees and luxury pool', elements: ['foundation', 'buildingMain', 'roof', 'chimney', 'door', 'windowG1', 'windowG2', 'windowG3', 'windowG4', 'windowF1', 'windowF2', 'windowF3', 'windowF4', 'balcony', 'treeLeft', 'treeRight', 'pool'] },
            { min: 50, max: 75, name: '👨‍👩‍👧‍👦 Family Home', desc: 'Family moves in!', elements: ['foundation', 'buildingMain', 'roof', 'chimney', 'door', 'windowG1', 'windowG2', 'windowG3', 'windowG4', 'windowF1', 'windowF2', 'windowF3', 'windowF4', 'balcony', 'treeLeft', 'treeRight', 'pool', 'dad', 'mom', 'kid1', 'kid2'] },
            { min: 75, max: 100, name: '🏰 Luxury Estate!', desc: 'Luxury cars, fence, lights!', elements: ['foundation', 'buildingMain', 'roof', 'chimney', 'door', 'windowG1', 'windowG2', 'windowG3', 'windowG4', 'windowF1', 'windowF2', 'windowF3', 'windowF4', 'balcony', 'treeLeft', 'treeRight', 'pool', 'dad', 'mom', 'kid1', 'kid2', 'car1', 'car2', 'fence', 'lights'] }
        ];

        const milestones = [
            { day: 7, icon: '🌟', text: 'Week 1', value: 2613 },
            { day: 30, icon: '📅', text: 'Month 1', value: 3987 },
            { day: 60, icon: '💰', text: 'Month 2', value: 7224 },
            { day: 90, icon: '🏆', text: 'Month 3', value: 13078 },
            { day: 180, icon: '💎', text: 'Half Year', value: 340318 },
            { day: 365, icon: '🏰', text: 'Full Year!', value: 3925613 }
        ];

        let gameState = {
            day: 13,
            currentValue: INITIAL_AMOUNT * Math.pow(DAILY_GROWTH, 13)
        };

        function loadGame() {
            const saved = localStorage.getItem('villaSave');
            if (saved) {
                gameState = JSON.parse(saved);
            }
        }

        function saveGame() {
            localStorage.setItem('villaSave', JSON.stringify(gameState));
        }

        function resetGame() {
            if (confirm('🚨 Are you sure? This will delete ALL progress!')) {
                localStorage.removeItem('villaSave');
                gameState = {
                    day: 13,
                    currentValue: INITIAL_AMOUNT * Math.pow(DAILY_GROWTH, 13)
                };
                saveGame();
                updateUI();
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 }
                });
            }
        }

        function formatCurrency(amount) {
            if (amount >= 1000000) return '$' + (amount / 1000000).toFixed(1) + 'M';
            if (amount >= 1000) return '$' + (amount / 1000).toFixed(1) + 'K';
            return '$' + amount.toLocaleString('en-US', { minimumFractionDigits: 0 });
        }

        function getProgressPercent() {
            return (gameState.day / TOTAL_DAYS) * 100;
        }

        function getCurrentStage() {
            const progress = getProgressPercent();
            for (let stage of stages) {
                if (progress >= stage.min && progress < stage.max) return stage;
            }
            return stages[stages.length - 1];
        }

        function updateVilla() {
            const stage = getCurrentStage();
            
            const allElements = ['foundation', 'buildingMain', 'roof', 'chimney', 'door', 'windowG1', 'windowG2', 'windowG3', 'windowG4', 'windowF1', 'windowF2', 'windowF3', 'windowF4', 'balcony', 'treeLeft', 'treeRight', 'pool', 'dad', 'mom', 'kid1', 'kid2', 'car1', 'car2', 'fence', 'lights'];
            
            allElements.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.remove('visible');
            });

            setTimeout(() => {
                stage.elements.forEach((id, index) => {
                    setTimeout(() => {
                        const el = document.getElementById(id);
                        if (el) el.classList.add('visible');
                    }, index * 150);
                });
            }, 300);

            document.getElementById('stageBanner').innerHTML = `
                <div class="stage-name">${stage.name}</div>
                <div class="stage-desc">${stage.desc}</div>
            `;
        }

        function updateUI() {
            const progress = getProgressPercent();
            const profit = gameState.currentValue - INITIAL_AMOUNT;

            document.getElementById('progressPercent').textContent = progress.toFixed(1) + '%';
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `Day ${gameState.day}/${TOTAL_DAYS}`;

            document.getElementById('currentValue').textContent = formatCurrency(gameState.currentValue);
            document.getElementById('profitValue').textContent = formatCurrency(profit);

            updateVilla();
            updateMilestones();
        }

        function updateMilestones() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '<div class="timeline-line"></div>';

            milestones.forEach(milestone => {
                const completed = gameState.day >= milestone.day;
                const div = document.createElement('div');
                div.className = 'milestone' + (completed ? ' completed' : '');
                div.innerHTML = `
                    <div class="milestone-dot"></div>
                    <div class="milestone-content">
                        <div class="milestone-header">
                            <span class="milestone-icon">${milestone.icon}</span>
                            <span class="milestone-title">${milestone.text}</span>
                        </div>
                        <div>Day ${milestone.day}</div>
                        <div class="milestone-value">${formatCurrency(milestone.value)}</div>
                    </div>
                `;
                timeline.appendChild(div);
            });
        }

        function completeDay() {
            gameState.day++;
            gameState.currentValue = INITIAL_AMOUNT * Math.pow(DAILY_GROWTH, gameState.day);
            
            saveGame();
            updateUI();

            const milestone = milestones.find(m => m.day === gameState.day);
            if (milestone) {
                confetti({
                    particleCount: 200,
                    spread: 90,
                    origin: { y: 0.6 }
                });
            }
        }

        function generateStars() {
            const bg = document.getElementById('bgAnimation');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                bg.appendChild(star);
            }
        }

        loadGame();
        generateStars();
        updateUI();

        setTimeout(() => {
            document.getElementById('progressFill').style.width = getProgressPercent() + '%';
        }, 500);
    </script>
</body>
</html>
