<!-- Mobile Enhancements -->
<style>
/* Tab Navigation */
.tab-nav {
    display: none;
    background: rgba(26, 31, 58, 0.95);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 10px;
    margin-bottom: 20px;
    gap: 10px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.tab-btn {
    flex: 1;
    padding: 15px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 15px;
    color: var(--text-primary);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
}

.tab-btn.active {
    background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
    border-color: var(--accent-primary);
    box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
}

/* Calendar View */
.calendar-view {
    display: none;
    background: rgba(26, 31, 58, 0.85);
    backdrop-filter: blur(25px);
    border-radius: 25px;
    padding: 25px;
    border: 1px solid rgba(255, 255, 255, 0.15);
}

.calendar-header {
    text-align: center;
    margin-bottom: 25px;
}

.calendar-title {
    font-size: 1.8em;
    font-weight: 800;
    margin-bottom: 10px;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
    gap: 8px;
    max-height: 600px;
    overflow-y: auto;
}

.calendar-day {
    aspect-ratio: 1;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.75em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    border: 2px solid rgba(255, 255, 255, 0.1);
}

.calendar-day.past {
    background: linear-gradient(135deg, var(--success) 0%, #2d8659 100%);
    color: white;
}

.calendar-day.current {
    background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
    color: white;
    box-shadow: 0 0 20px rgba(102, 126, 234, 0.6);
    animation: currentDayPulse 2s infinite;
}

.calendar-day.future {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-secondary);
}

.calendar-day.milestone {
    border-color: var(--accent-gold);
    box-shadow: 0 0 15px rgba(243, 156, 18, 0.4);
}

.calendar-day:hover {
    transform: scale(1.15);
    z-index: 10;
}

.day-number {
    font-size: 1.1em;
    margin-bottom: 2px;
}

.day-value {
    font-size: 0.7em;
    opacity: 0.8;
}

@keyframes currentDayPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
}

/* Mobile Responsive */
@media (max-width: 768px) {
    .tab-nav {
        display: flex;
    }
    
    .main-grid {
        grid-template-columns: 1fr;
    }
    
    .villa-scene {
        height: 400px;
    }
    
    .header-title {
        font-size: 2.2em;
    }
    
    .calendar-grid {
        grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
        gap: 6px;
        max-height: 500px;
    }
    
    .stats-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
    }
    
    .stat-box {
        padding: 18px;
    }
    
    .stat-value {
        font-size: 1.6em;
    }
    
    .action-buttons {
        gap: 12px;
    }
    
    .btn {
        padding: 18px;
        font-size: 1em;
    }
}

@media (max-width: 480px) {
    .header-title {
        font-size: 1.8em;
    }
    
    .calendar-grid {
        grid-template-columns: repeat(7, 1fr);
    }
    
    .stats-grid {
        grid-template-columns: 1fr;
    }
}
</style>

<!-- Tab Navigation HTML -->
<div class="tab-nav" id="tabNav">
    <button class="tab-btn active" onclick="showView('villa')">🏠 Villa</button>
    <button class="tab-btn" onclick="showView('calendar')">📅 365 Days</button>
</div>

<!-- Calendar View HTML -->
<div class="calendar-view" id="calendarView">
    <div class="calendar-header">
        <h2 class="calendar-title">📅 365 Days Journey</h2>
        <p style="color: var(--text-secondary);">Track every day of your mission</p>
    </div>
    <div class="calendar-grid" id="calendarGrid">
        <!-- Days will be generated by JS -->
    </div>
</div>

<script>
// View Management
function showView(view) {
    const villaView = document.querySelector('.main-grid');
    const calendarView = document.getElementById('calendarView');
    const tabBtns = document.querySelectorAll('.tab-btn');
    
    tabBtns.forEach(btn => btn.classList.remove('active'));
    
    if (view === 'villa') {
        villaView.style.display = 'grid';
        calendarView.style.display = 'none';
        tabBtns[0].classList.add('active');
    } else {
        villaView.style.display = 'none';
        calendarView.style.display = 'block';
        tabBtns[1].classList.add('active');
        generateCalendar();
    }
}

// Generate Calendar
function generateCalendar() {
    const grid = document.getElementById('calendarGrid');
    if (grid.children.length > 0) return; // Already generated
    
    const milestones = [7, 30, 60, 90, 180, 365];
    
    for (let day = 0; day <= 365; day++) {
        const amount = INITIAL_AMOUNT * Math.pow(DAILY_GROWTH, day);
        const div = document.createElement('div');
        div.className = 'calendar-day';
        
        if (day < gameState.day) {
            div.classList.add('past');
        } else if (day === gameState.day) {
            div.classList.add('current');
        } else {
            div.classList.add('future');
        }
        
        if (milestones.includes(day)) {
            div.classList.add('milestone');
        }
        
        div.innerHTML = `
            <div class="day-number">${day}</div>
            <div class="day-value">${formatCurrency(amount)}</div>
        `;
        
        div.onclick = () => {
            alert(`Day ${day}\\nValue: ${formatCurrency(amount)}\\nProfit: ${formatCurrency(amount - INITIAL_AMOUNT)}`);
        };
        
        grid.appendChild(div);
    }
}

// Initialize on mobile
if (window.innerWidth <= 768) {
    document.addEventListener('DOMContentLoaded', () => {
        const tabNav = document.getElementById('tabNav');
        const container = document.querySelector('.container');
        const header = document.querySelector('.header');
        
        if (tabNav && header) {
            header.after(tabNav);
        }
    });
}
</script>
